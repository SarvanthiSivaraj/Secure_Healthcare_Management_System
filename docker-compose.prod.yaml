# Usage: docker compose -f docker-compose.prod.yaml up -d
services:
  # ── PostgreSQL Database ──────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: healthcare_db_prod
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata
    # No host port exposure in production — backend connects via internal network
    expose:
      - "5432"
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1024M
        reservations:
          cpus: "0.5"
          memory: 256M
    security_opt:
      - no-new-privileges:true
    networks:
      - data_net
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
        tag: "{{.Name}}"

  # ── Backend API (production) ─────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: healthcare_backend_prod
    restart: always
    read_only: true
    environment:
      NODE_ENV: production
      PORT: 5000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-1h}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      ENCRYPTION_ALGORITHM: aes-256-gcm
      EMAIL_HOST: ${EMAIL_HOST}
      EMAIL_PORT: ${EMAIL_PORT}
      EMAIL_SECURE: ${EMAIL_SECURE:-true}
      EMAIL_USER: ${EMAIL_USER}
      EMAIL_PASSWORD: ${EMAIL_PASSWORD}
      EMAIL_FROM: ${EMAIL_FROM}
      CORS_ORIGIN: ${CORS_ORIGIN}
      BCRYPT_ROUNDS: 12
      AUDIT_LOG_RETENTION_DAYS: 2555
      ENABLE_HASH_CHAIN: "true"
      SESSION_TIMEOUT_MINUTES: 30
      AUTO_LOGOUT_ENABLED: "true"
      RATE_LIMIT_MAX_REQUESTS: 100
      LOGIN_RATE_LIMIT_MAX_ATTEMPTS: 5
      OTP_RATE_LIMIT_MAX_ATTEMPTS: 3
    # No host port exposure — frontend reverse-proxies to backend
    expose:
      - "5000"
    tmpfs:
      - /tmp:noexec,nosuid,size=64M
    volumes:
      - backend_uploads_prod:/app/uploads
      - backend_logs_prod:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:5000/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 128M
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    networks:
      - app_net
      - data_net
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "10"
        tag: "{{.Name}}"

  # ── Frontend (production nginx) ──────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
    container_name: healthcare_frontend_prod
    restart: always
    read_only: true
    ports:
      - "${FRONTEND_PORT:-443}:80"
    tmpfs:
      - /tmp:noexec,nosuid,size=32M
      - /var/cache/nginx:size=64M
      - /var/run:size=1M
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M
        reservations:
          cpus: "0.1"
          memory: 32M
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE    # nginx needs to bind to port 80
    security_opt:
      - no-new-privileges:true
    networks:
      - public_net
      - app_net
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "5"
        tag: "{{.Name}}"

volumes:
  postgres_data_prod:
    driver: local
  backend_uploads_prod:
    driver: local
  backend_logs_prod:
    driver: local

networks:
  # Public-facing network (only frontend exposed)
  public_net:
    driver: bridge

  # Internal application network (frontend <-> backend)
  app_net:
    driver: bridge
    internal: true

  # Data network (backend <-> postgres only)
  data_net:
    driver: bridge
    internal: true
