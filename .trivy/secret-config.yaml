# Trivy Secret Scanning Configuration
# Custom patterns for healthcare-specific secrets

rules:
  - id: healthcare-api-key
    category: Healthcare
    title: Healthcare API Key
    severity: CRITICAL
    regex: '(?i)(healthcare|medical|patient)[-_]?(api)?[-_]?key\s*[:=]\s*["\x27]?[a-zA-Z0-9]{20,}["\x27]?'
    
  - id: patient-id-pattern
    category: PII
    title: Potential Patient ID in Code
    severity: HIGH
    regex: 'PATIENT[-_]ID\s*[:=]\s*["\x27]?[0-9]{6,}["\x27]?'
    
  - id: ssn-pattern
    category: PII
    title: Social Security Number
    severity: CRITICAL
    regex: '\b[0-9]{3}-[0-9]{2}-[0-9]{4}\b'
    
  - id: hipaa-phi
    category: PHI
    title: Potential PHI in Source
    severity: HIGH
    regex: '(?i)(ssn|dob|medical[-_]?record[-_]?number)\s*[:=]'

allowlist:
  - description: Test data markers
    paths:
      - '**/tests/**'
      - '**/test/**'
      - '**/*.test.js'
      - '**/*.spec.js'
    rules:
      - patient-id-pattern
      - healthcare-api-key
